{% extends "base.html" %}
{% block title %}Setup Two-Factor Authentication{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-3">Setup Two-Factor Authentication</h2>
    <div class="card p-3">
      <p>Scan this QR code with your authenticator app:</p>
      <div class="text-center mb-3">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ provisioning_uri|urlencode }}" alt="QR Code" class="img-fluid">
      </div>
      <p><strong>Or enter this code manually:</strong></p>
      <code class="d-block p-2 bg-light">{{ secret }}</code>
      <form method="post" class="mt-3">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_code">Enter the 6-digit code from your app to verify:</label>
          <input class="form-control" type="text" name="code" maxlength="6" pattern="[0-9]{6}" required id="id_code">
        </div>
        <button class="btn btn-success">Verify & Enable 2FA</button>
        <a href="{% url 'user_profile' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
