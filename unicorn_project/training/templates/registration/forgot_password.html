{% extends "base.html" %}
{% block title %}Forgotten password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-3">Forgotten password</h2>
    <p class="text-muted">Enter the email address on your account. We will email you a new temporary password.</p>

    <form method="post" class="card p-3">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="id_email">Email address</label>
        <input class="form-control" type="email" name="email" required id="id_email" autocomplete="email">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Send new password</button>
        <a class="btn btn-light" href="{% url 'login' %}">Back to sign in</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
